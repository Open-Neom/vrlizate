name: vrlizate
description: VR 3D engine for Flutter. Scene graph, mesh rendering, lighting,
  stereoscopic projection, head tracking, interaction, animation, and effects.
version: 1.0.0
homepage: https://github.com/Open-Neom/vrlizate
repository: https://github.com/Open-Neom/vrlizate
issue_tracker: https://github.com/Open-Neom/vrlizate/issues
topics:
  - vr
  - virtual-reality
  - 3d
  - game-engine
  - flutter
platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

screenshots:
  - description: VRlizate — A complete 3D/VR engine for Flutter
    path: doc/logo.png

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  vector_math: ^2.1.4
  sensors_plus: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
